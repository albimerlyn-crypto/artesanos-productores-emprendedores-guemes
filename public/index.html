<!DOCTYPE html>
<html>
<head>
<title>Artesanos y Productores de Güemes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#b30000;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
background:#b30000;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin-top:5px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>
Artesanos y Productores de Güemes
</header>

<div class="container">

<h2>Publicar producto</h2>

<input id="titulo" placeholder="Nombre del producto">
<input id="precio" placeholder="Precio">
<input id="vendedor" placeholder="Nombre del vendedor">
<input id="imagen" placeholder="URL de la foto del producto">

<button onclick="publicar()">Publicar</button>

<h2>Productos publicados</h2>

<div id="lista"></div>

<h2>Mapa de negocios de Güemes</h2>

<iframe
width="100%"
height="300"
src="https://maps.google.com/maps?q=General%20Guemes%20Salta&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

<script>

let productos=[]

async function cargar(){

const res = await fetch("/productos")
productos = await res.json()

lista.innerHTML=""

productos.forEach((p,i)=>{

lista.innerHTML+=`
<div class="card">

<h3>${p.titulo}</h3>

<p><b>Precio:</b> $${p.precio}</p>

<p><b>Vendedor:</b> ${p.vendedor}</p>

<img src="${p.imagen}">

<button onclick="eliminar(${i})">Eliminar</button>

</div>
`

})

}

async function publicar(){

const producto={
titulo:titulo.value,
precio:precio.value,
vendedor:vendedor.value,
imagen:imagen.value
}

await fetch("/productos",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(producto)
})

titulo.value=""
precio.value=""
vendedor.value=""
imagen.value=""

cargar()

}

function eliminar(i){

productos.splice(i,1)

fetch("/productos",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(productos)
})

cargar()

}

cargar()

</script>

</body>
</html>

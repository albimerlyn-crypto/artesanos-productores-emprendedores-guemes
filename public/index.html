<!DOCTYPE html>
<html>
<head>
<title>Artesanos y Productores Generar Güemes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#b30000;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:#1c1c1c;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
background:#b30000;
color:white;
border:none;
padding:10px;
border-radius:8px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

</style>
</head>

<body>

<header>
Artesanos y Productores Generar Güemes
</header>

<div class="container">

<h2>Publicar producto</h2>

<input id="titulo" placeholder="Nombre del producto">
<input id="precio" placeholder="Precio">

<button onclick="publicar()">Publicar</button>

<h2>Productos</h2>

<div id="lista"></div>

</div>

<script>

async function cargar(){

const res = await fetch("/productos")
const data = await res.json()

lista.innerHTML=""

data.forEach(p=>{

lista.innerHTML+=`
<div class="card">
<h3>${p.titulo}</h3>
<p>$${p.precio}</p>
</div>
`

})

}

async function publicar(){

await fetch("/productos",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
titulo:titulo.value,
precio:precio.value
})
})

cargar()

}

cargar()

</script>

</body>
</html>
